version: '3.8'

services:
  api:
    build: .
    image: bj-realestate-api:latest
    container_name: bj-realestate-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 数据库文件持久化（容器重建不丢数据）
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_TYPE=sqlite
      - DB_SQLITE_PATH=/app/data/bj_realestate.db
      - LOG_LEVEL=info
      - CRAWL_MODE=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
